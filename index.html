<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Li</title>

    <link rel="stylesheet" href="./libraries/swiper-bundle.min.css" />
    <link rel="stylesheet" href="./styles/main.css" />

    <script src="./libraries/swiper-bundle.min.js" defer></script>
    <script src="./scripts/main.js" defer type="module"></script>
  </head>
  <body>
    <header class="header">
      <div class="header__content container">
        <a href="/" class="header__logo-link">
          <img
            class="header__logo-img"
            src="./icons/logo_full.svg"
            alt=""
            width="87"
            height="21"
          />
        </a>
        <nav class="header__nav menu">
          <ul class="menu__list">
            <li class="menu__item">
              <a href="" class="menu__link">main</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">projects</a>
            </li>
            <!-- <li class="menu__item">
              <a href="" class="menu__link">skills</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">about-me</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">contacts</a>
            </li> -->
          </ul>
        </nav>
      </div>
    </header>
    <section class="hero">
      <div class="hero__content container">
        <div class="hero__text-part">
          <h1 class="hero__title">
            Lilusia is a
            <span class="hero__title_accent">front-end developer</span>
          </h1>
          <p class="hero__description">
            She responsibly and pixel-perfectly creates responsive websites
          </p>
        </div>
        <div class="hero__image-part">
          <div class="hero__image-wrapper">
            <img
              class="hero__img"
              src="./images/photo.png"
              alt="Lilusia's photo"
              width="457"
              height="386"
              loading="lazy"
            />
          </div>
          <p class="hero__status">
            Currently <span class="hero__status_white">looking for a job</span>
          </p>
        </div>
      </div>
    </section>

    <section class="projects">
      <div class="projects__content container">
        <h2 class="projects__title">projects</h2>
        <div class="projects__slider slider" id="projects-container">
          <!-- Data from js -->
        </div>
      </div>
    </section>

    <footer class="footer">
      <div class="footer__content container">
        <div class="footer__main-part">
          <div class="footer__hero">
            <a href="/" class="footer__logo-link">
              <img
                class="header__logo-img"
                src="./icons/logo_full.svg"
                alt=""
                width="87"
                height="21"
              />
            </a>
            <p class="footer__hero-description">Front-end developer</p>
          </div>
          <address class="footer__contacts">
            <h2 class="footer__contacts-title">Contacts</h2>
            <ul class="footer__contacts-list">
              <li class="footer__contacts-item footer__contacts-item_phone">
                <a href="tel:+79581733559" class="footer__contacts-link">
                  +7(958)173-35-59
                </a>
              </li>
              <li class="footer__contacts-item footer__contacts-item_email">
                <a
                  href="mailto:e.kresik@yandex.ru"
                  class="footer__contacts-link"
                >
                  e.kresik@yandex.ru
                </a>
              </li>
              <li class="footer__contacts-item footer__contacts-item_telegram">
                <a
                  href="https://t.me/lilusia_li"
                  class="footer__contacts-link"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  @lilusia-li
                </a>
              </li>
              <li class="footer__contacts-item footer__contacts-item_github">
                <a
                  href="https://github.com/lilusia-li"
                  class="footer__contacts-link"
                  target="_blank"
                  rel="noopener noreferrer"
                >
                  lilusia-li
                </a>
              </li>
            </ul>
          </address>
        </div>

        <small class="footer__design">
          © Based on
          <a
            href="https://www.figma.com/community/file/1164933568884615740/portfolio"
            class="footer__design-link"
            target="_blank"
            rel="noopener noreferrer"
          >
            Elias's layout
          </a>
        </small>
      </div>
    </footer>
  </body>
</html>
