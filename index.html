<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Li</title>

    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__content container">
        <a href="/" class="header__logo-link">
          <img
            class="header__logo-img"
            src="./icons/logo_full.svg"
            alt=""
            width="87"
            height="21"
          />
        </a>
        <nav class="header__nav menu">
          <ul class="menu__list">
            <li class="menu__item">
              <a href="" class="menu__link">main</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">projects</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">skills</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">about-me</a>
            </li>
            <li class="menu__item">
              <a href="" class="menu__link">contacts</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <section class="hero">
      <div class="hero__content container">
        <div class="hero__text-part">
          <h1 class="hero__title">
            Lilusia is a
            <span class="hero__title_accent">front-end developer</span>
          </h1>
          <p class="hero__description">
            She creates responsive websites with precision and responsibility
          </p>
        </div>
        <div class="hero__image-part">
          <div class="hero__image-wrapper">
            <img
              class="hero__img"
              src="./images/photo.png"
              alt="Lilusia's photo"
              width="457"
              height="386"
              loading="lazy"
            />
          </div>
          <p class="hero__status">
            Currently <span class="hero__status_white">looking for a job</span>
          </p>
        </div>
      </div>
    </section>
    <section class="projects">
      <div class="projects__content container">
        <h2 class="projects__title">projects</h2>
        <div class="projects__slider slider">
          <div class="slider__card project-card">
            <img
              class="project-card__image"
              src="./images/projects/future_tech.png"
              alt="Future-tech wallpaper"
              width="330"
              height="201"
              loading="lazy"
            />
            <ul class="project-card__stack-list">
              <li class="project-card__stack-item">HTML</li>
              <li class="project-card__stack-item">SCSS</li>
              <li class="project-card__stack-item">JS</li>
              <li class="project-card__stack-item">BEM</li>
              <li class="project-card__stack-item">Adaptive</li>
            </ul>
            <div class="project-card__specification">
              <h3 class="project-card__name">Future-tech</h3>
              <p class="project-card__description">Website layout</p>
              <div class="project-card__links">
                <a
                  class="project-card__link project-card__link_accent"
                  href="https://lilusia-li.github.io/future-tech/"
                  target="_blank"
                >
                  Open
                </a>
                <a
                  class="project-card__link project-card__link_gray"
                  href="https://github.com/lilusia-li/future-tech"
                  target="_blank"
                >
                  Github
                </a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
